name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec nx affected -t typecheck --base=origin/main --head=HEAD

      - name: Lint
        run: pnpm exec nx affected -t lint --base=origin/main --head=HEAD

      - name: Test
        run: pnpm exec nx affected -t test --base=origin/main --head=HEAD

      - name: Build
        run: pnpm exec nx affected -t build --base=origin/main --head=HEAD

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start infrastructure
        run: docker compose -f infra/docker/docker-compose.yml up -d --wait

      - name: Run migrations
        run: |
          export POSTGRES_URL=postgres://smriti:smriti@localhost:55432/smriti
          export REDIS_URL=redis://localhost:6379
          export KAFKA_BROKERS=localhost:9092
          pnpm db:migrate

      - name: Integration tests
        env:
          SMRITI_INTEGRATION: '1'
          POSTGRES_URL: postgres://smriti:smriti@localhost:55432/smriti
        run: pnpm exec nx run @smriti/postgres:test

  docker-build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t smriti-api:ci .

      - name: Verify API image module resolution
        run: docker run --rm smriti-api:ci node --input-type=module -e "import 'reflect-metadata'"

      - name: Build embedding-worker image
        run: docker build -f apps/worker.Dockerfile --build-arg WORKER=embedding-worker -t smriti-embedding-worker:ci .

      - name: Verify embedding-worker image module resolution
        run: docker run --rm smriti-embedding-worker:ci node --input-type=module -e "import 'kafkajs'"
